name: Update README

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run cog
        env:
          LLM_GITHUB_MODELS_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: cog -r -b "<!-- [[[cog" -e "]]] -->" -E "<!-- [[[end]]] -->" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          find . -maxdepth 2 -name '_summary.md' -exec git add {} +
          git diff --cached --quiet || git commit -m "Auto-update README [skip ci]"
          git push
